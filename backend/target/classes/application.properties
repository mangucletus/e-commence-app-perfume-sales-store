spring.application.name=perfume-store
server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/perfume_store
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=5000ms

# JWT
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# CORS
app.cors.allowed-origins=http://localhost:5173

# Actuator / Metrics
management.endpoints.web.exposure.include=health,prometheus,metrics,info
# always: lets Railway/Render see exactly which component is DOWN when diagnosing
management.endpoint.health.show-details=always
# Redis is a cache — a Redis blip should not mark the whole service as unhealthy
management.health.redis.enabled=false
management.metrics.tags.application=perfume-store
