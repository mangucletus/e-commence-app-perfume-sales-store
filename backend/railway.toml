# Railway service configuration for the Spring Boot backend.
# Railway reads this file automatically when the root directory is set to backend/.
#
# Observability note:
#   Prometheus / Grafana / Loki / Promtail are NOT deployed on Railway.
#   The backend still exposes /actuator/prometheus and /actuator/health —
#   point a Grafana Cloud agent at the public backend URL to collect metrics.
#   See README.md → "Cloud Observability" for setup instructions.

[build]
dockerfile = "Dockerfile"

[deploy]
healthcheckPath = "/actuator/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
