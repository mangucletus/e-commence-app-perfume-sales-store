spring.application.name=perfume-store
server.port=${PORT:8080}

# PostgreSQL
# Railway auto-injects PGHOST/PGPORT/PGDATABASE/PGUSER/PGPASSWORD when Postgres is linked.
# Render sets SPRING_DATASOURCE_* via render.yaml. Local dev uses the hardcoded defaults.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:perfume_store}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${PGUSER:postgres}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:postgres}}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# Redis
# Railway auto-injects REDISHOST/REDISPORT when Redis is linked.
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:${REDISHOST:localhost}}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:${REDISPORT:6379}}
spring.data.redis.timeout=5000ms

# JWT
app.jwt.secret=${APP_JWT_SECRET:local-dev-secret-change-in-production}
app.jwt.expiration=${APP_JWT_EXPIRATION:86400000}

# CORS
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

# Actuator / Metrics
management.endpoints.web.exposure.include=health,prometheus,metrics,info
management.endpoint.health.show-details=always
management.health.redis.enabled=false
management.metrics.tags.application=perfume-store
