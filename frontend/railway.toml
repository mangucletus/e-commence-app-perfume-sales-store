# Railway service configuration for the React/Nginx frontend.
# Railway reads this file automatically when the root directory is set to frontend/.
#
# Set BACKEND_URL environment variable in the Railway dashboard to your
# deployed backend URL, e.g. https://perfume-store-backend.railway.app
# The Nginx container substitutes this value at startup via envsubst.

[build]
dockerfile = "Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
